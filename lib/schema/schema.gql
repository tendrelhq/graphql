type Language {
  id: ID!
  code: String!
  name: Name!
  name_id: ID!
}

type Name {
  id: ID!
  language: Language!
  language_id: ID!
  metadata: NameMetadata!
  value: String!
}

type NameMetadata {
  name_id: ID!
  source_text: String!
  source_language_id: ID!
  source_language: Language!
  translated_at: String!
}

type Tag {
  id: ID!
  name: Name!
  name_id: ID!
  type: String!
  parent: Tag
  parent_id: ID
}

type EnabledLanguage {
  id: ID!
  active: Boolean!
  activated_at: String
  deactivated_at: String
  language: Language!
  language_id: ID!
  primary: Boolean!
}

enum InvitationStatus {
  pending
  accepted
  revoked
}

type Invitation {
  id: ID!
  status: InvitationStatus!
  email_address: String!
  worker_id: ID!
  created_at: String!
  updated_at: String!
}

type Organization {
  id: ID!
  active: Boolean!
  activated_at: String
  deactivated_at: String
  billing_id: String
  languages: [EnabledLanguage!]!
  locations(first: Int, last: Int, before: String, after: String): LocationConnection!
  name: Name!
  name_id: ID!
  workers(first: Int, last: Int, before: String, after: String): WorkerConnection!
}

type Location {
  id: ID!
  active: Boolean!
  activated_at: String
  deactivated_at: String
  children(options: LocationsQueryOptions): [Location!]!
  name: Name!
  name_id: ID!
  parent: Location
  parent_id: ID
  scan_code: ID
  site: Location!
  site_id: ID!
  tags: [Tag!]!
}

type LocationConnection {
  edges: [LocationEdge!]!
  pageInfo: PageInfo!
}

type LocationEdge {
  location: Location!
}

type User {
  id: ID!
  active: Boolean!
  activated_at: String
  deactivated_at: String
  authentication_identity_id: ID
  authentication_provider: Tag
  authentication_provider_id: ID
  displayName: String!
  firstName: String!
  lastName: String!
  language: Language!
  language_id: ID!
  organizations(first: Int, last: Int, after: String, before: String): OrganizationConnection!
  tags: [Tag!]!
}

type OrganizationConnection {
  edges: [OrganizationEdge!]!
  pageInfo: PageInfo!
}

type OrganizationEdge {
  organization: Organization!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPrevPage: Boolean!
  startCursor: String
  endCursor: String
}

type Worker {
  id: ID!
  active: Boolean!
  activated_at: String
  deactivated_at: String
  invitation: Invitation
  invitation_id: ID
  language: Language!
  language_id: ID!
  role: Tag!
  role_id: ID!
  scan_code: String
  tags: [Tag!]!
  user: User!
  user_id: ID!
}

type WorkerConnection {
  edges: [WorkerEdge!]!
  pageInfo: PageInfo!
}

type WorkerEdge {
  worker: Worker!
}

type Query {
  languages: [Language!]!
  locations(customerId: ID!, options: LocationsQueryOptions): [Location!]!
  location(id: ID!): Location!
  name(id: ID!): Name!
  organizations: [Organization!]!
  organization(id: ID!): Organization!
  roles: [Tag!]!
  workers(customerId: ID!, options: WorkersQueryOptions): [Worker!]!

  # v2
  user: User!
}

input LocationsQueryOptions {
  cornerstone: Boolean
  site: Boolean
}

input WorkersQueryOptions {
  active: Boolean
  site: ID
}

type Mutation {
  # Location CRUD
  createLocation(input: CreateLocationInput!): Location!
  updateLocation(input: UpdateLocationInput!): Location!

  # Name CRUD
  updateName(input: UpdateNameInput!): Name!

  # User
  ## CRUD
  createUser(input: CreateUserInput!): User!
  updateUser(input: UpdateUserInput!): User!

  # Worker
  ## CRUD
  createWorker(input: CreateWorkerInput!): Worker!
  updateWorker(input: UpdateWorkerInput!): Worker!
  ## Helpers
  activateWorker(id: ID!): Worker!
  deactivateWorker(id: ID!): Worker!
  createInvitation(input: CreateInvitationInput!): Invitation!
  acceptInvitation(input: AcceptInvitationInput!): Worker!

  # Organization helpers
  enableLanguage(orgId: ID!, languageId: ID!): Boolean!
  disableLanguage(orgId: ID!, languageId: ID!): Boolean!
}

input CreateLocationInput {
  id: ID
  active: Boolean!
  name: CreateNameInput!
  org_id: ID!
  scan_code: ID
}

input UpdateLocationInput {
  id: ID!
  activated_at: String
  deactivated_at: String
  name: UpdateNameInput
  scan_code: ID
}

input CreateUserInput {
  id: ID
  active: Boolean!
  language_id: ID!
  firstName: String!
  lastName: String!
  displayName: String
  username: String
}

input UpdateUserInput {
  id: ID!
  language_id: ID!
  firstName: String!
  lastName: String!
  displayName: String
}

input CreateWorkerInput {
  id: ID
  active: Boolean!
  language_id: ID!
  org_id: ID!
  role_id: ID!
  scan_code: ID
  user_id: ID!
}

input UpdateWorkerInput {
  id: ID!
  activated_at: String
  deactivated_at: String
  language_id: ID!
  role_id: ID!
  scan_code: ID
}

input CreateNameInput {
  id: ID
  active: Boolean!
  language_id: ID!
  value: String!
}

input UpdateNameInput {
  id: ID!
  activated_at: String
  deactivated_at: String
  language_id: ID!
  value: String!
}

input CreateInvitationInput {
  email_address: String!
  org_id: ID!
  worker_id: ID!
}

input AcceptInvitationInput {
  authentication_identity_id: ID!
  worker_id: ID!
}
